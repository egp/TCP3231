name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - arduino:renesas_uno:minima
          - arduino:renesas_uno:unor4wifi

    steps:
      - name: Check out TCP3231
        uses: actions/checkout@v4

      - name: Check out TCP1819 dependency
        uses: actions/checkout@v4
        with:
          repository: egp/TCP1819
          path: ${{ github.workspace }}/_deps/TCP1819

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.x"

      - name: Compile examples
        env:
          FQBN: ${{ matrix.fqbn }}
          TCP1819_SRC: ${{ github.workspace }}/_deps/TCP1819
        run: |
          chmod +x tools/compile-examples.sh
          ./tools/compile-examples.sh